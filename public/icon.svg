<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" width="400" height="400">

  <!-- Badge background — white -->
  <rect x="8" y="8" width="384" height="384" rx="50" fill="white"/>
  <!-- Badge border — light blue dashed -->
  <rect x="20" y="20" width="360" height="360" rx="42" fill="none" stroke="#8ec4de" stroke-width="3" stroke-dasharray="8 4"/>

  <!-- ========== CHUP CHUP — embalagem selada azul (left) ========== -->
  <g transform="translate(152, 152) rotate(-9)">

    <!-- Wrapper body -->
    <rect x="-38" y="-70" width="76" height="140" rx="9" fill="#bcd4ee"/>
    <!-- Left edge shadow -->
    <rect x="-38" y="-60" width="10" height="120" rx="5" fill="#9ab8dc" opacity="0.7"/>
    <!-- Right edge highlight -->
    <rect x="28" y="-60" width="10" height="120" rx="5" fill="white" opacity="0.22"/>
    <!-- Center vertical sheen -->
    <rect x="-8" y="-58" width="6" height="116" rx="3" fill="white" opacity="0.14"/>

    <!-- Top sealed edge (darker strip + crinkle) -->
    <rect x="-38" y="-70" width="76" height="15" rx="9" fill="#96b4d8"/>
    <path d="M-36 -55 Q-18 -60 0 -55 Q18 -60 36 -55" fill="none" stroke="#7aa0c8" stroke-width="1.4"/>

    <!-- Bottom sealed edge -->
    <rect x="-38" y="55" width="76" height="15" rx="9" fill="#96b4d8"/>
    <path d="M-36 55 Q-18 59 0 55 Q18 59 36 55" fill="none" stroke="#7aa0c8" stroke-width="1.4"/>

    <!-- LABEL — pink oval -->
    <ellipse cx="0" cy="0" rx="31" ry="42" fill="#fcd4e4"/>
    <!-- Label dotted border -->
    <ellipse cx="0" cy="0" rx="28" ry="39" fill="none" stroke="#e8a0c0" stroke-width="1.4" stroke-dasharray="3 2.5"/>
    <!-- "D." text -->
    <text y="-14" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#c04878">D.</text>
    <!-- "GOURMET" text -->
    <text y="2" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#c04878" letter-spacing="0.6">GOURMET</text>
    <!-- Strawberry icon -->
    <ellipse cx="-9" cy="18" rx="6" ry="7" fill="#e83050"/>
    <path d="M-9 11 L-12 8 M-9 11 L-9 7 M-9 11 L-6 8" stroke="#28a028" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Coconut/round sweet icon -->
    <circle cx="9" cy="19" r="6.5" fill="#f4d880"/>
    <circle cx="9" cy="19" r="3.5" fill="#e8c040"/>

    <!-- BOW — left lobe -->
    <ellipse cx="-15" cy="-80" rx="18" ry="11" fill="#f09ab8" transform="rotate(-32, -15, -80)"/>
    <!-- BOW — right lobe -->
    <ellipse cx="15" cy="-80" rx="18" ry="11" fill="#f09ab8" transform="rotate(32, 15, -80)"/>
    <!-- BOW — center knot -->
    <ellipse cx="0" cy="-79" rx="10" ry="8" fill="#d07098"/>
    <!-- BOW — ribbon tails -->
    <path d="M-5 -77 Q-12 -68 -18 -63" stroke="#d07098" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M5 -77 Q12 -68 18 -63" stroke="#d07098" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ========== PICOLÉ — caramelo e sprinkles (right) ========== -->
  <g transform="translate(257, 138) rotate(11)">

    <!-- Stick — madeira -->
    <rect x="-9" y="56" width="18" height="82" rx="6" fill="#c8904a"/>
    <!-- Stick highlight -->
    <rect x="-3" y="58" width="6" height="78" rx="3" fill="#e0b870" opacity="0.55"/>
    <!-- Stick bottom rounded cap -->
    <ellipse cx="0" cy="138" rx="9" ry="5" fill="#b87838"/>

    <!-- Cream body -->
    <rect x="-33" y="-62" width="66" height="124" rx="20" fill="#fef6e0"/>
    <!-- Left shadow on cream -->
    <rect x="-33" y="-42" width="12" height="104" rx="6" fill="#f0e4c0" opacity="0.55"/>
    <!-- Right highlight on cream -->
    <rect x="21" y="-42" width="9" height="100" rx="4" fill="white" opacity="0.45"/>

    <!-- Caramel / golden drizzle coating on top -->
    <rect x="-33" y="-62" width="66" height="54" rx="20" fill="#d4903a"/>
    <!-- Caramel sheen -->
    <rect x="-22" y="-60" width="14" height="48" rx="5" fill="#e8a848" opacity="0.35"/>

    <!-- Caramel drizzle drips (amber streaks) -->
    <path d="M-22 -8 Q-28 6 -20 18 Q-16 26 -22 36" fill="none" stroke="#b87028" stroke-width="6.5" stroke-linecap="round"/>
    <path d="M-2 -6 Q3 9 -1 22 Q-5 30 0 38" fill="none" stroke="#b87028" stroke-width="6" stroke-linecap="round"/>
    <path d="M17 -10 Q22 3 18 15 Q14 23 18 32" fill="none" stroke="#b87028" stroke-width="5.5" stroke-linecap="round"/>

    <!-- Sprinkles redondos — coloridos -->
    <circle cx="-24" cy="-52" r="4" fill="#e84040"/>
    <circle cx="-10" cy="-55" r="4" fill="#4080e8"/>
    <circle cx="5"   cy="-50" r="4" fill="#f0c030"/>
    <circle cx="20"  cy="-56" r="4" fill="#40c870"/>
    <circle cx="-18" cy="-40" r="3.5" fill="#e840d0"/>
    <circle cx="-2"  cy="-38" r="3.5" fill="#e84040"/>
    <circle cx="15"  cy="-42" r="3.5" fill="#4080e8"/>
    <circle cx="-26" cy="-26" r="3.5" fill="#f07828"/>
    <circle cx="22"  cy="-28" r="3.5" fill="#f0c030"/>
    <circle cx="-8"  cy="-22" r="3.5" fill="#40c870"/>
    <circle cx="8"   cy="-20" r="3.5" fill="#e84040"/>

    <!-- Gold square wafer pieces -->
    <rect x="-17" y="-34" width="8" height="8" rx="1.5" fill="#e8c040" transform="rotate(18, -13, -30)"/>
    <rect x="5"   y="-30" width="8" height="8" rx="1.5" fill="#e8c040" transform="rotate(-22, 9, -26)"/>
    <rect x="-24" y="-14" width="7" height="7" rx="1.5" fill="#f0d050" transform="rotate(10, -20, -10)"/>
  </g>

  <!-- ========== DG MONOGRAM ========== -->
  <text
    x="200" y="296"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="76" font-weight="900"
    font-style="italic"
    fill="#182848"
    letter-spacing="3"
  >DG</text>

  <!-- Thin separator -->
  <line x1="62" y1="313" x2="338" y2="313" stroke="#8ec4de" stroke-width="1.5"/>

  <!-- ========== DUDA GOURMET ========== -->
  <text
    x="200" y="350"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="27"
    font-style="italic"
    font-weight="700"
    fill="#182848"
    letter-spacing="1.5"
  >Duda Gourmet</text>

</svg>